<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aurtiro | Redirecting</title>
    <script>
      (function redirectToSpa() {
        var destination = window.location.pathname + window.location.search + window.location.hash;
        var encoded = encodeURIComponent(destination);
        window.location.replace('/?p=' + encoded);
      })();
    </script>
  </head>
  <body></body>
</html>
